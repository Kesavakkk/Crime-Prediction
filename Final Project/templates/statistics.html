<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Statistics Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .navbar {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .navbar h1 { color: #667eea; font-size: 24px; }
        .navbar a {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            margin-left: 10px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .stat-card .number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .stat-card .label {
            font-size: 16px;
            color: #666;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .card h2 { color: #333; margin-bottom: 20px; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Crime Statistics Dashboard</h1>
        <div>
            <a href="/userhome">Dashboard</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number">{{ "{:,}".format(stats.total_crimes) }}</div>
                <div class="label">Total Crimes</div>
            </div>
            <div class="stat-card">
                <div class="number">{{ stats.total_states }}</div>
                <div class="label">States/UTs</div>
            </div>
            <div class="stat-card">
                <div class="number">{{ "{:,}".format(stats.avg_crimes) }}</div>
                <div class="label">Avg per State</div>
            </div>
        </div>
        
        <div class="card">
            <h2>Crime Type Distribution</h2>
            <img src="data:image/png;base64,{{ chart_url }}" alt="Crime Distribution">
        </div>
    </div>
</body>
</html>
