<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import External Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .navbar {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .navbar h1 { color: #667eea; font-size: 24px; }
        .navbar a {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .card h2 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .example {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Import External Data</h1>
        <a href="/admin">Back to Admin</a>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>Import Crime Dataset</h2>
            <p style="color: #666; margin-bottom: 20px;">Import crime data from external sources (CSV format)</p>
            
            <form id="importForm">
                <div class="form-group">
                    <label for="url">Dataset URL</label>
                    <input type="url" id="url" name="url" placeholder="https://example.com/data.csv" required>
                    <div class="example">
                        <strong>Example:</strong><br>
                        https://www.opendatabay.com/data/government/157f4656-4632-45b3-815e-2046551aabd1
                    </div>
                </div>
                
                <button type="submit" class="btn">Import Data</button>
            </form>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <script>
        document.getElementById('importForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = document.getElementById('url').value;
            const messageDiv = document.getElementById('message');
            const btn = e.target.querySelector('button');
            
            btn.disabled = true;
            btn.textContent = 'Importing...';
            messageDiv.style.display = 'none';
            
            try {
                const response = await fetch('/admin/import-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `url=${encodeURIComponent(url)}`
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = `Data imported successfully: ${data.filename}`;
                    messageDiv.style.display = 'block';
                    document.getElementById('url').value = '';
                } else {
                    throw new Error(data.error || 'Import failed');
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = `Error: ${error.message}`;
                messageDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Import Data';
            }
        });
    </script>
</body>
</html>
