<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Analytics Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .navbar {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .navbar h1 { color: #667eea; font-size: 24px; }
        .navbar a {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .stat-card .label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .chart-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .chart-card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .chart-card img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
        @media (min-width: 768px) {
            .chart-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .chart-card.full-width {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>📊 Crime Analytics Dashboard</h1>
        <a href="/userhome">Back to Home</a>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number">{{ stats.total_crimes }}</div>
                <div class="label">Total Crimes</div>
            </div>
            <div class="stat-card">
                <div class="number">{{ stats.total_states }}</div>
                <div class="label">States/UTs</div>
            </div>
            <div class="stat-card">
                <div class="number">{{ stats.crime_types }}</div>
                <div class="label">Crime Types</div>
            </div>
            <div class="stat-card">
                <div class="number">{{ stats.years }}</div>
                <div class="label">Years of Data</div>
            </div>
        </div>
        
        <div class="chart-grid">
            <div class="chart-card">
                <h2>🏙️ Top 10 States by Crime</h2>
                <img src="data:image/png;base64,{{ chart1 }}" alt="Top States Chart">
            </div>
            
            <div class="chart-card">
                <h2>🔍 Crime Types Distribution</h2>
                <img src="data:image/png;base64,{{ chart2 }}" alt="Crime Types Chart">
            </div>
            
            {% if chart3 %}
            <div class="chart-card full-width">
                <h2>📈 Yearly Crime Trends</h2>
                <img src="data:image/png;base64,{{ chart3 }}" alt="Yearly Trends Chart">
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
