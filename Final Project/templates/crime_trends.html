<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Trends Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            padding: 20px;
        }
        
        body.light-mode {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
        }
        
        .navbar {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        body.dark-mode .navbar {
            background: #0f3460;
        }
        
        .navbar h1 { color: #667eea; font-size: 24px; }
        body.dark-mode .navbar h1 { color: #64ffda; }
        
        .theme-toggle {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .chart-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        body.dark-mode .chart-card {
            background: #0f3460;
        }
        
        .chart-card h3 {
            margin-bottom: 20px;
            color: #333;
        }
        
        body.dark-mode .chart-card h3 { color: #64ffda; }
        
        .chart-container {
            position: relative;
            height: 350px;
        }
        
        .btn {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin-right: 10px;
        }
        
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="light-mode">
    <div class="navbar">
        <h1>📈 Crime Trends Analysis</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
            <a href="/profile" class="btn">👤 Profile</a>
            <a href="/userhome" class="btn">← Home</a>
        </div>
    </div>
    
    <div class="container">
        <div class="chart-grid">
            <div class="chart-card">
                <h3>📊 Yearly Crime Trends</h3>
                <div class="chart-container">
                    <canvas id="yearlyChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h3>🗺️ Top 10 States by Crime</h3>
                <div class="chart-container">
                    <canvas id="stateChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="chart-card">
            <h3>🔍 Crime Type Distribution</h3>
            <div class="chart-container">
                <canvas id="crimeTypeChart"></canvas>
            </div>
        </div>
    </div>
    
    <script>
        // Data from Flask
        const yearlyData = {{ yearly_data | tojson }};
        const stateData = {{ state_data | tojson }};
        const crimeTypeData = {{ crime_type_data | tojson }};
        
        let charts = [];
        
        function createCharts() {
            const isDark = document.body.classList.contains('dark-mode');
            const textColor = isDark ? '#e0e0e0' : '#333';
            const gridColor = isDark ? '#1a1a2e' : '#e0e0e0';
            
            // Destroy existing charts
            charts.forEach(chart => chart.destroy());
            charts = [];
            
            // Yearly Trend Chart
            if (yearlyData.years && yearlyData.years.length > 0) {
                const ctx1 = document.getElementById('yearlyChart').getContext('2d');
                charts.push(new Chart(ctx1, {
                    type: 'line',
                    data: {
                        labels: yearlyData.years,
                        datasets: [{
                            label: 'Total Crimes',
                            data: yearlyData.total,
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: textColor } }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { color: textColor },
                                grid: { color: gridColor }
                            },
                            x: {
                                ticks: { color: textColor },
                                grid: { color: gridColor }
                            }
                        }
                    }
                }));
            }
            
            // State Chart
            const ctx2 = document.getElementById('stateChart').getContext('2d');
            charts.push(new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: stateData.states,
                    datasets: [{
                        label: 'Total Crimes',
                        data: stateData.crimes,
                        backgroundColor: [
                            '#dc3545', '#e74c3c', '#e67e22', '#f39c12', '#f1c40f',
                            '#2ecc71', '#27ae60', '#3498db', '#2980b9', '#9b59b6'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: textColor },
                            grid: { color: gridColor }
                        },
                        x: {
                            ticks: { color: textColor, maxRotation: 45, minRotation: 45 },
                            grid: { display: false }
                        }
                    }
                }
            }));
            
            // Crime Type Chart
            const ctx3 = document.getElementById('crimeTypeChart').getContext('2d');
            charts.push(new Chart(ctx3, {
                type: 'doughnut',
                data: {
                    labels: crimeTypeData.types,
                    datasets: [{
                        data: crimeTypeData.counts,
                        backgroundColor: [
                            '#667eea', '#764ba2', '#f093fb', '#4facfe',
                            '#43e97b', '#fa709a', '#fee140', '#30cfd0'
                        ],
                        borderWidth: 2,
                        borderColor: isDark ? '#0f3460' : '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: textColor, padding: 15 }
                        }
                    }
                }
            }));
        }
        
        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                btn.textContent = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                btn.textContent = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            }
            
            createCharts();
        }
        
        // Load saved theme and create charts
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            
            if (savedTheme === 'dark') {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                btn.textContent = '☀️ Light Mode';
            }
            
            createCharts();
        });
    </script>
</body>
</html>
