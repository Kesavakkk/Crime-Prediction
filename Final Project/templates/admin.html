<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .navbar {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .navbar h1 { color: #667eea; font-size: 24px; }
        .navbar a {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .stat-box .number { font-size: 36px; font-weight: bold; color: #667eea; }
        .stat-box .label { font-size: 14px; color: #666; margin-top: 5px; }
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .card h2 { color: #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        table thead { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        table th { padding: 15px; text-align: left; font-weight: 600; }
        table td { padding: 12px 15px; border-bottom: 1px solid #e0e0e0; }
        table tbody tr:hover { background-color: #f5f5f5; }
        .btn-delete {
            background: #e74c3c;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
        }
        .btn-delete:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Admin Panel</h1>
        <div style="display: flex; gap: 10px;">
            <a href="/test-realtime" style="background:#dc3545;">🔴 Real-Time</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-box">
                <div class="number">{{ total_users }}</div>
                <div class="label">Total Users</div>
            </div>
        </div>
        
        <div class="card">
            <h2>User Management</h2>
            <div style="margin-bottom: 20px;">
                <a href="/ml-training" style="background:#6610f2; color:white; padding:10px 20px; border-radius:5px; text-decoration:none; font-weight:600; margin-right:10px;">ML Training</a>
                <a href="/dataset-info" style="background:#17a2b8; color:white; padding:10px 20px; border-radius:5px; text-decoration:none; font-weight:600; margin-right:10px;">Dataset Info</a>
                <a href="/admin/import-data" style="background:#28a745; color:white; padding:10px 20px; border-radius:5px; text-decoration:none; font-weight:600;">Import External Data</a>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Username</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user[0] }}</td>
                        <td>{{ user[1] }}</td>
                        <td>{{ user[2] }}</td>
                        <td>{{ user[3] }}</td>
                        <td>
                            <a href="/admin/delete/{{ user[0] }}" class="btn-delete" onclick="return confirm('Delete this user?')">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
