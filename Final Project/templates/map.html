<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Zone Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .navbar {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .navbar h1 { color: #667eea; font-size: 24px; }
        .navbar a {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            margin-left: 10px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        #map { height: 600px; border-radius: 8px; position: relative; }
        .layer-control { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .layer-control button { display: block; width: 100%; padding: 8px; margin: 3px 0; border: none; border-radius: 3px; cursor: pointer; background: #667eea; color: white; font-size: 12px; }
        .layer-control button.active { background: #28a745; }
        .search-box { position: absolute; top: 10px; left: 60px; z-index: 1000; background: white; padding: 8px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .search-box input { padding: 6px; border: 1px solid #ddd; border-radius: 3px; width: 200px; }
        .directions-panel { position: absolute; bottom: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); max-width: 300px; max-height: 200px; overflow-y: auto; display: none; }
        .directions-panel h4 { margin: 0 0 8px 0; font-size: 14px; }
        .directions-panel .step { font-size: 12px; padding: 4px 0; border-bottom: 1px solid #eee; }
        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 20px; height: 20px; border-radius: 50%; }
        .safe { background: #28a745; }
        .unsafe { background: #dc3545; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🗺️ Crime Zone Map</h1>
        <div>
            <a href="/userhome">Dashboard</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <div class="card">
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color safe"></div>
                    <span>Safe Zone</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color unsafe"></div>
                    <span>Unsafe Zone</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff0000; border-radius: 50%;"></div>
                    <span>Crime Incident</span>
                </div>
            </div>
            <div id="map">
                <div class="layer-control">
                    <button id="streetBtn" class="active" onclick="switchLayer('street')">🗺️ Street</button>
                    <button id="satelliteBtn" onclick="switchLayer('satellite')">🛰️ Satellite</button>
                    <button id="terrainBtn" onclick="switchLayer('terrain')">⛰️ Terrain</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search state..." onkeyup="searchLocation()">
                </div>
                <div class="directions-panel" id="directionsPanel"></div>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script>
        const map = L.map('map').setView([20.5937, 78.9629], 5);
        
        const layers = {
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri' }),
            terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '© OpenTopoMap' })
        };
        
        let currentLayer = layers.street.addTo(map);
        let markers = {};
        let routingControl = null;
        
        const coords = {
            'ANDHRA PRADESH': [15.9129, 79.7400], 'ARUNACHAL PRADESH': [28.2180, 94.7278],
            'ASSAM': [26.2006, 92.9376], 'BIHAR': [25.0961, 85.3131],
            'CHHATTISGARH': [21.2787, 81.8661], 'GOA': [15.2993, 74.1240],
            'GUJARAT': [22.2587, 71.1924], 'HARYANA': [29.0588, 76.0856],
            'HIMACHAL PRADESH': [31.1048, 77.1734], 'JHARKHAND': [23.6102, 85.2799],
            'KARNATAKA': [15.3173, 75.7139], 'KERALA': [10.8505, 76.2711],
            'MADHYA PRADESH': [22.9734, 78.6569], 'MAHARASHTRA': [19.7515, 75.7139],
            'MANIPUR': [24.6637, 93.9063], 'MEGHALAYA': [25.4670, 91.3662],
            'MIZORAM': [23.1645, 92.9376], 'NAGALAND': [26.1584, 94.5624],
            'ODISHA': [20.9517, 85.0985], 'PUNJAB': [31.1471, 75.3412],
            'RAJASTHAN': [27.0238, 74.2179], 'SIKKIM': [27.5330, 88.5122],
            'TAMIL NADU': [11.1271, 78.6569], 'TELANGANA': [18.1124, 79.0193],
            'TRIPURA': [23.9408, 91.9882], 'UTTAR PRADESH': [26.8467, 80.9462],
            'UTTARAKHAND': [30.0668, 79.0193], 'WEST BENGAL': [22.9868, 87.8550],
            'DELHI': [28.7041, 77.1025], 'JAMMU & KASHMIR': [33.7782, 76.5762]
        };
        
        const stateStatus = {{ state_status|tojson }};
        const crimeIncidents = {{ crime_incidents|tojson }};
        
        function switchLayer(type) {
            map.removeLayer(currentLayer);
            currentLayer = layers[type].addTo(map);
            document.querySelectorAll('.layer-control button').forEach(b => b.classList.remove('active'));
            document.getElementById(type + 'Btn').classList.add('active');
        }
        
        function searchLocation() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            for (const [state, marker] of Object.entries(markers)) {
                if (state.toLowerCase().includes(query)) {
                    marker.openPopup();
                    map.setView(marker.getLatLng(), 7);
                    break;
                }
            }
        }
        
        function getDirections(start, end) {
            if (routingControl) map.removeControl(routingControl);
            
            routingControl = L.Routing.control({
                waypoints: [L.latLng(start), L.latLng(end)],
                routeWhileDragging: false,
                show: false,
                createMarker: () => null
            }).on('routesfound', function(e) {
                const route = e.routes[0];
                const panel = document.getElementById('directionsPanel');
                panel.innerHTML = `<h4>📍 Directions (${(route.summary.totalDistance/1000).toFixed(1)} km, ${Math.round(route.summary.totalTime/60)} min)</h4>`;
                route.instructions.forEach((instr, i) => {
                    panel.innerHTML += `<div class="step">${i+1}. ${instr.text} (${(instr.distance/1000).toFixed(1)} km)</div>`;
                });
                panel.style.display = 'block';
            }).addTo(map);
        }
        
        for (const [state, status] of Object.entries(stateStatus)) {
            if (coords[state]) {
                const color = status === 'SAFE' ? '#28a745' : '#dc3545';
                const marker = L.circleMarker(coords[state], {
                    radius: 10,
                    fillColor: color,
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).bindPopup(`<b>${state}</b><br>Status: ${status}<br><button onclick="getDirections([20.5937, 78.9629], [${coords[state]}])">Get Directions</button>`).addTo(map);
                markers[state] = marker;
            }
        }
        
        crimeIncidents.forEach(crime => {
            const severityColor = crime.severity === 'Critical' ? '#8b0000' : 
                                 crime.severity === 'High' ? '#ff0000' : 
                                 crime.severity === 'Medium' ? '#ff8800' : '#ffcc00';
            
            const customIcon = L.divIcon({
                className: 'crime-marker',
                html: `<div style="background:${severityColor};width:18px;height:18px;border-radius:50%;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.5);animation:pulse 2s infinite;"></div>`,
                iconSize: [18, 18]
            });
            
            L.marker([crime.lat, crime.lng], {icon: customIcon})
                .addTo(map)
                .bindPopup(`<div style="min-width:180px;"><h3 style="margin:0 0 8px 0;color:#ff0000;font-size:14px;">⚠️ ${crime.type}</h3><p style="margin:4px 0;font-size:12px;"><strong>Severity:</strong> <span style="color:${severityColor};">${crime.severity}</span></p><p style="margin:4px 0;font-size:12px;">${crime.time}</p></div>`);
        });
    </script>
    <style>
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
    </style>
</body>
</html>
