<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
        }
        h2 { color: #667eea; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .msg { color: #dc3545; margin-bottom: 15px; font-size: 14px; }
        .success { background: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-bottom: 15px; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #667eea; text-decoration: none; }
        .reset-link-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #667eea;
            margin-bottom: 20px;
        }
        .reset-link-box h3 { color: #667eea; margin-bottom: 10px; font-size: 16px; }
        .reset-link-box a {
            display: block;
            padding: 12px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            font-weight: 600;
            margin-top: 10px;
        }
        .reset-link-box a:hover { background: #5568d3; }
        .copy-link {
            background: white;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 12px;
            word-break: break-all;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Forgot Password</h2>
        <p>Enter your username to get a password reset link.</p>
        
        {% if msg %}
        <div class="msg">{{ msg }}</div>
        {% endif %}
        
        {% if success %}
        <div class="reset-link-box">
            <h3>✅ Reset Link Generated!</h3>
            <p style="font-size: 13px; color: #666; margin-bottom: 10px;">Click the button below to reset your password:</p>
            <a href="{{ reset_link }}" target="_blank">Reset Password Now</a>
            <p style="font-size: 11px; color: #999; margin-top: 10px;">Or copy this link:</p>
            <div class="copy-link" onclick="copyLink(this)" title="Click to copy">{{ reset_link }}</div>
        </div>
        {% else %}
        <form method="post">
            <input type="text" name="username" placeholder="Enter your username" required>
            <button type="submit">Get Reset Link</button>
        </form>
        {% endif %}
        
        <div class="back-link">
            <a href="/">← Back to Login</a>
        </div>
    </div>
    
    <script>
        function copyLink(element) {
            const text = element.textContent;
            navigator.clipboard.writeText(text).then(() => {
                element.style.background = '#d4edda';
                element.textContent = '✓ Copied!';
                setTimeout(() => {
                    element.style.background = 'white';
                    element.textContent = text;
                }, 2000);
            });
        }
    </script>
</body>
</html>
