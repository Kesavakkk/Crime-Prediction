<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Crime Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .status { display: inline-block; padding: 5px 15px; background: #10b981; border-radius: 20px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h3 { font-size: 14px; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; }
        .card .value { font-size: 36px; font-weight: bold; color: #667eea; }
        .card .trend { font-size: 14px; color: #10b981; margin-top: 5px; }
        #map { height: 500px; border-radius: 10px; margin-bottom: 20px; }
        .chart-container { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        canvas { max-height: 300px; }
        .alerts { background: #1e293b; padding: 20px; border-radius: 10px; max-height: 400px; overflow-y: auto; }
        .alert-item { background: #ef4444; padding: 15px; border-radius: 8px; margin-bottom: 10px; animation: slideIn 0.3s; }
        .alert-item.medium { background: #f59e0b; }
        .alert-item.low { background: #3b82f6; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚨 Real-time Crime Prediction Dashboard</h1>
            <span class="status pulse">● LIVE</span>
            <span style="float: right; font-size: 14px;">Active Users: <span id="userCount">0</span></span>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Total Crimes</h3>
                <div class="value" id="totalCrimes">0</div>
                <div class="trend">↑ Live updating</div>
            </div>
            <div class="card">
                <h3>Unsafe States</h3>
                <div class="value" id="unsafeStates" style="color: #ef4444;">0</div>
                <div class="trend">ML Predicted</div>
            </div>
            <div class="card">
                <h3>Safe States</h3>
                <div class="value" id="safeStates" style="color: #10b981;">0</div>
                <div class="trend">ML Predicted</div>
            </div>
            <div class="card">
                <h3>Active Alerts</h3>
                <div class="value" id="alertCount" style="color: #f59e0b;">0</div>
                <div class="trend">Anomaly Detection</div>
            </div>
        </div>

        <div id="map"></div>

        <div class="chart-container">
            <h3 style="margin-bottom: 15px;">Crime Trends (Live)</h3>
            <canvas id="trendChart"></canvas>
        </div>

        <div class="alerts">
            <h3 style="margin-bottom: 15px;">🔔 Real-time Alerts</h3>
            <div id="alertsList"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let map, heatLayer, trendChart;
        const alertsData = [];

        // Initialize map
        map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Initialize chart
        const ctx = document.getElementById('trendChart').getContext('2d');
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Total Crimes',
                    data: [],
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#e2e8f0' } } },
                scales: {
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });

        // Socket events
        socket.on('connect', () => {
            console.log('Connected to real-time server');
            socket.emit('request_heatmap');
        });

        socket.on('user_count', (data) => {
            document.getElementById('userCount').textContent = data.count;
        });

        socket.on('dashboard_update', (data) => {
            const stats = data.current;
            document.getElementById('totalCrimes').textContent = stats.total_crimes.toLocaleString();
            document.getElementById('unsafeStates').textContent = stats.unsafe_states;
            document.getElementById('safeStates').textContent = stats.safe_states;

            // Update chart
            const time = new Date(stats.timestamp).toLocaleTimeString();
            if (trendChart.data.labels.length > 20) {
                trendChart.data.labels.shift();
                trendChart.data.datasets[0].data.shift();
            }
            trendChart.data.labels.push(time);
            trendChart.data.datasets[0].data.push(stats.total_crimes);
            trendChart.update('none');
        });

        socket.on('heatmap_update', (data) => {
            console.log('Heatmap data received:', data.points.length, 'points');
            if (heatLayer) map.removeLayer(heatLayer);
            
            // Add heatmap
            heatLayer = L.heatLayer(data.points, {
                radius: 30,
                blur: 40,
                maxZoom: 10,
                max: 1.0,
                gradient: {0.2: 'green', 0.4: 'yellow', 0.6: 'orange', 0.8: 'red', 1.0: 'darkred'}
            }).addTo(map);
            
            // Add markers for high crime areas
            data.points.forEach(point => {
                if (point[2] > 0.7) { // High crime intensity
                    L.circleMarker([point[0], point[1]], {
                        radius: 8,
                        fillColor: '#ff0000',
                        color: '#fff',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map).bindPopup('⚠️ High Crime Area');
                }
            });
        });

        socket.on('ml_alert', (data) => {
            data.alerts.forEach(alert => {
                alertsData.unshift(alert);
                if (alertsData.length > 10) alertsData.pop();
            });
            document.getElementById('alertCount').textContent = alertsData.length;
            renderAlerts();
        });

        // Initialize with real data
        fetch('/api/predict-realtime', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({state: 'ALL'})
        })
        .then(r => r.json())
        .then(data => {
            if (data.stats) {
                document.getElementById('totalCrimes').textContent = data.stats.total_crimes.toLocaleString();
                document.getElementById('unsafeStates').textContent = data.stats.unsafe_states;
                document.getElementById('safeStates').textContent = data.stats.safe_states;
            }
        });

        // Request heatmap immediately
        socket.emit('request_heatmap');

        function renderAlerts() {
            const container = document.getElementById('alertsList');
            container.innerHTML = alertsData.map(alert => `
                <div class="alert-item ${alert.severity.toLowerCase()}">
                    <strong>${alert.state}</strong> - ${alert.message}
                    <br><small>${new Date(alert.timestamp).toLocaleString()}</small>
                </div>
            `).join('');
        }

        // Request updates every 5 seconds
        setInterval(() => {
            socket.emit('request_heatmap');
            fetch('/api/predict-realtime', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({state: 'ALL'})
            })
            .then(r => r.json())
            .then(data => {
                if (data.stats) {
                    document.getElementById('totalCrimes').textContent = data.stats.total_crimes.toLocaleString();
                    document.getElementById('unsafeStates').textContent = data.stats.unsafe_states;
                    document.getElementById('safeStates').textContent = data.stats.safe_states;
                    
                    const time = new Date().toLocaleTimeString();
                    if (trendChart.data.labels.length > 20) {
                        trendChart.data.labels.shift();
                        trendChart.data.datasets[0].data.shift();
                    }
                    trendChart.data.labels.push(time);
                    trendChart.data.datasets[0].data.push(data.stats.total_crimes);
                    trendChart.update('none');
                }
            });
        }, 5000);
    </script>
</body>
</html>
