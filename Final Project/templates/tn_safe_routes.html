<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Nadu Safe Routes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f1e; color: #fff; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .header h1 { font-size: 28px; }
        .back-btn { padding: 10px 20px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 8px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .controls { background: #1a1a2e; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 200px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #b0b0b0; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; border-radius: 5px; cursor: pointer; }
        .input-group select option { background: #1a1a2e; color: white; padding: 10px; }
        .input-group select:focus { outline: none; border-color: #667eea; background: rgba(255,255,255,0.1); }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); }
        #map { height: 600px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .legend { background: #1a1a2e; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .legend-item { display: inline-flex; align-items: center; gap: 8px; margin-right: 20px; }
        .legend-color { width: 20px; height: 20px; border-radius: 3px; }
        .map-controls { position: absolute; top: 80px; right: 30px; z-index: 1000; background: #1a1a2e; padding: 15px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .map-controls button { display: block; width: 100%; padding: 10px; margin: 5px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .map-controls button:hover { transform: scale(1.05); }
        .search-box { position: absolute; top: 80px; left: 30px; z-index: 1000; background: #1a1a2e; padding: 15px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); width: 300px; }
        .search-box input { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; border-radius: 5px; }
        .search-results { max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .search-result-item { padding: 10px; background: rgba(255,255,255,0.05); margin: 5px 0; border-radius: 5px; cursor: pointer; }
        .search-result-item:hover { background: rgba(102,126,234,0.3); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗺️ Tamil Nadu Safe Routes</h1>
        <a href="/protection-dashboard" class="back-btn">← Back</a>
    </div>

    <div class="container">
        <div class="controls">
            <div class="input-group">
                <label>From (District)</label>
                <select id="fromDistrict">
                    {% for district in districts %}
                    <option value="{{ district.lat }},{{ district.lng }}">{{ district.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="input-group">
                <label>To (District)</label>
                <select id="toDistrict">
                    {% for district in districts %}
                    <option value="{{ district.lat }},{{ district.lng }}" {% if loop.index == 2 %}selected{% endif %}>{{ district.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="input-group">
                <label>Route Type</label>
                <select id="routeType">
                    <option value="safe">Safest Route</option>
                    <option value="fast">Fastest Route</option>
                    <option value="balanced">Balanced</option>
                </select>
            </div>
            <div class="input-group" style="display: flex; align-items: flex-end;">
                <button class="btn btn-primary" onclick="findRoute()" style="width: 100%;">🧭 Find Safe Route</button>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search location..." onkeyup="searchLocation()">
            <div class="search-results" id="searchResults"></div>
        </div>

        <div class="map-controls">
            <button onclick="switchLayer('street')" style="background: #667eea; color: white;">🗺️ Street Map</button>
            <button onclick="switchLayer('satellite')" style="background: #28a745; color: white;">🛰️ Satellite</button>
            <button onclick="switchLayer('terrain')" style="background: #ffc107; color: white;">⛰️ Terrain</button>
            <button onclick="getDirections()" style="background: #dc3545; color: white;">🧭 Directions</button>
        </div>

        <div id="map"></div>

        <div class="legend">
            <strong>Legend:</strong>
            <div class="legend-item">
                <div class="legend-color" style="background: #28a745;"></div>
                <span>Safe Zone</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ffc107;"></div>
                <span>Moderate Risk</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #dc3545;"></div>
                <span>High Risk</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #007bff;"></div>
                <span>Safe Route</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ff0000; border-radius: 50%;"></div>
                <span>Crime Incident</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([11.1271, 78.6569], 7);
        
        // Multiple tile layers
        const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        });
        
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri'
        });
        
        const terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenTopoMap'
        });
        
        let currentLayer = streetLayer;
        currentLayer.addTo(map);
        
        function switchLayer(type) {
            map.removeLayer(currentLayer);
            if (type === 'street') currentLayer = streetLayer;
            else if (type === 'satellite') currentLayer = satelliteLayer;
            else if (type === 'terrain') currentLayer = terrainLayer;
            currentLayer.addTo(map);
        }

        const districts = {{ districts|tojson }};
        const crimeIncidents = {{ crime_incidents|tojson }};

        districts.forEach(district => {
            const color = district.safe ? '#28a745' : '#dc3545';
            L.circle([district.lat, district.lng], {
                color: color,
                fillColor: color,
                fillOpacity: 0.3,
                radius: 20000
            }).addTo(map).bindPopup(`<b>${district.name}</b><br>Crimes: ${district.crimes}<br>Status: ${district.safe ? 'SAFE' : 'UNSAFE'}`);
            
            L.marker([district.lat, district.lng]).addTo(map).bindPopup(`<b>${district.name}</b><br>${district.crimes} crimes`);
        });

        // Add crime incident markers
        const crimeIcon = L.divIcon({
            className: 'crime-marker',
            html: '<div style="background:#ff0000;width:20px;height:20px;border-radius:50%;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.5);"></div>',
            iconSize: [20, 20]
        });

        crimeIncidents.forEach(crime => {
            const severityColor = crime.severity === 'Critical' ? '#8b0000' : 
                                 crime.severity === 'High' ? '#ff0000' : 
                                 crime.severity === 'Medium' ? '#ff8800' : '#ffcc00';
            
            const customIcon = L.divIcon({
                className: 'crime-marker',
                html: `<div style="background:${severityColor};width:20px;height:20px;border-radius:50%;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.5);animation:pulse 2s infinite;"></div>`,
                iconSize: [20, 20]
            });
            
            L.marker([crime.lat, crime.lng], {icon: customIcon})
                .addTo(map)
                .bindPopup(`<div style="min-width:200px;">
                    <h3 style="margin:0 0 10px 0;color:#ff0000;">⚠️ Crime Alert</h3>
                    <p style="margin:5px 0;"><strong>Type:</strong> ${crime.type}</p>
                    <p style="margin:5px 0;"><strong>Severity:</strong> <span style="color:${severityColor};font-weight:bold;">${crime.severity}</span></p>
                    <p style="margin:5px 0;"><strong>Time:</strong> ${crime.time}</p>
                    <p style="margin:10px 0 0 0;font-size:12px;color:#666;">Stay alert in this area</p>
                </div>`);
        });

        let currentRoute = null;

        function checkDangerZone(coords) {
            const dangerZones = districts.filter(d => !d.safe);
            for (let zone of dangerZones) {
                if (Math.abs(coords[0] - zone.lat) < 0.5 && Math.abs(coords[1] - zone.lng) < 0.5) return zone.name;
            }
            return null;
        }

        function showDangerAlert(zone) {
            const div = document.createElement('div');
            div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#dc3545;color:white;padding:30px;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,0.5);z-index:9999;max-width:400px;text-align:center;';
            div.innerHTML = `<div style="font-size:48px;margin-bottom:15px;">⚠️</div><h2 style="margin-bottom:10px;">DANGER ZONE ALERT!</h2><p style="margin-bottom:20px;">Entering high-risk area: <strong>${zone}</strong></p><p style="font-size:14px;margin-bottom:20px;">• Stay alert<br>• Avoid isolated areas<br>• Keep emergency contacts ready</p><button onclick="this.parentElement.remove()" style="padding:10px 30px;background:white;color:#dc3545;border:none;border-radius:8px;font-weight:600;cursor:pointer;">I Understand</button>`;
            document.body.appendChild(div);
        }

        function findRoute() {
            const from = document.getElementById('fromDistrict').value.split(',').map(Number);
            const to = document.getElementById('toDistrict').value.split(',').map(Number);
            const routeType = document.getElementById('routeType').value;

            const danger = checkDangerZone(to);
            if (danger) showDangerAlert(danger);

            if (currentRoute) map.removeLayer(currentRoute);

            currentRoute = L.polyline([from, to], {color: '#007bff', weight: 5, opacity: 0.7}).addTo(map);
            map.fitBounds(currentRoute.getBounds(), { padding: [50, 50] });

            // Find crimes near the route
            const nearbyCrimes = crimeIncidents.filter(crime => {
                const bounds = currentRoute.getBounds();
                return bounds.contains([crime.lat, crime.lng]);
            });

            const distance = (Math.sqrt(Math.pow(to[0]-from[0], 2) + Math.pow(to[1]-from[1], 2)) * 111).toFixed(0);
            const time = (distance / 60).toFixed(1);
            
            let crimeWarning = nearbyCrimes.length > 0 ? 
                `<br><span style="color:#ff0000;">⚠️ ${nearbyCrimes.length} crime incident(s) near route</span>` : 
                `<br><span style="color:#28a745;">✅ No recent crimes on route</span>`;
            
            L.popup().setLatLng([(from[0]+to[0])/2, (from[1]+to[1])/2])
                .setContent(`<b>Safe Route Found</b><br>Distance: ~${distance} km<br>Time: ~${time} hours<br>Type: ${routeType}${crimeWarning}`)
                .openOn(map);
        }
        
        function searchLocation() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const results = document.getElementById('searchResults');
            
            if (query.length < 2) {
                results.innerHTML = '';
                return;
            }
            
            const matches = districts.filter(d => d.name.toLowerCase().includes(query));
            results.innerHTML = matches.map(d => 
                `<div class="search-result-item" onclick="goToLocation(${d.lat}, ${d.lng}, '${d.name}')">
                    ${d.name} - ${d.safe ? '✅ Safe' : '⚠️ Unsafe'}
                </div>`
            ).join('');
        }
        
        function goToLocation(lat, lng, name) {
            map.setView([lat, lng], 10);
            L.popup().setLatLng([lat, lng]).setContent(`<b>${name}</b>`).openOn(map);
            document.getElementById('searchInput').value = name;
            document.getElementById('searchResults').innerHTML = '';
        }
        
        function getDirections() {
            const from = document.getElementById('fromDistrict').value.split(',').map(Number);
            const to = document.getElementById('toDistrict').value.split(',').map(Number);
            
            if (currentRoute) map.removeLayer(currentRoute);
            
            // Simulate turn-by-turn directions
            const distance = (Math.sqrt(Math.pow(to[0]-from[0], 2) + Math.pow(to[1]-from[1], 2)) * 111).toFixed(0);
            const time = (distance / 60).toFixed(1);
            
            currentRoute = L.polyline([from, to], {color: '#007bff', weight: 5, opacity: 0.7}).addTo(map);
            map.fitBounds(currentRoute.getBounds(), { padding: [50, 50] });
            
            alert(`🧭 Turn-by-Turn Directions\n\n` +
                  `📍 Start: ${document.getElementById('fromDistrict').options[document.getElementById('fromDistrict').selectedIndex].text}\n` +
                  `📍 End: ${document.getElementById('toDistrict').options[document.getElementById('toDistrict').selectedIndex].text}\n\n` +
                  `📏 Distance: ${distance} km\n` +
                  `⏱️ Time: ${time} hours\n\n` +
                  `Directions:\n` +
                  `1. Head towards destination\n` +
                  `2. Follow the blue route on map\n` +
                  `3. Stay on safe roads\n` +
                  `4. Arrive at destination`);
        }
    </script>
    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
    </style>
</body>
</html>
