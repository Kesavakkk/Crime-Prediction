<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔴 Real-Time Crime Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: #667eea; font-size: 28px; }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .pulse {
            width: 12px;
            height: 12px;
            background: #28a745;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .stat-number { font-size: 48px; font-weight: bold; margin: 10px 0; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .chart-card { grid-column: span 2; }
        canvas { max-height: 350px; }
        .data-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .data-item {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .state-name { font-weight: bold; color: #333; }
        .crime-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }
        .btn-container { text-align: center; margin: 20px 0; }
        .back-btn {
            background: #6c757d;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔴 Real-Time Crime Dashboard</h1>
            <div class="status-badge">
                <div class="pulse"></div>
                <span id="status" style="font-weight: bold; color: #28a745;">Connected</span>
                <span style="color: #666;">|</span>
                <span style="color: #666;">👥 <strong id="users">0</strong> Active</span>
            </div>
        </div>

        <div class="grid">
            <div class="card stat-card">
                <div class="stat-label">Total Crimes</div>
                <div class="stat-number" id="totalCrimes">0</div>
                <div class="stat-label">Latest Year</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">Top State</div>
                <div class="stat-number" id="topState" style="font-size: 24px;">-</div>
                <div class="stat-label">Highest Crime Rate</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">Data Year</div>
                <div class="stat-number" id="dataYear">-</div>
                <div class="stat-label">Latest Available</div>
            </div>
        </div>

        <div class="grid">
            <div class="card chart-card">
                <h3 style="color: #333; margin-bottom: 20px;">📊 Top 10 Crime States</h3>
                <canvas id="crimeChart"></canvas>
            </div>
            <div class="card">
                <h3 style="color: #333; margin-bottom: 20px;">📋 State Rankings</h3>
                <ul class="data-list" id="dataList">
                    <li style="text-align: center; color: #999; padding: 40px;">Loading data...</li>
                </ul>
            </div>
        </div>

        <div class="btn-container">
            <button onclick="requestData()">🔄 Refresh Data</button>
            <button class="back-btn" onclick="window.location.href='/admin'">← Back to Admin</button>
        </div>
    </div>

    <script>
        const socket = io();
        let chart = null;

        socket.on('connect', () => {
            document.getElementById('status').textContent = 'Connected';
            socket.emit('request_live_data');
        });

        socket.on('disconnect', () => {
            document.getElementById('status').textContent = 'Disconnected';
            document.getElementById('status').style.color = '#dc3545';
        });

        socket.on('user_count', (data) => {
            document.getElementById('users').textContent = data.count;
        });

        socket.on('live_data_update', (data) => {
            // Update stats
            const totalCrimes = data.crimes.reduce((a, b) => a + b, 0);
            document.getElementById('totalCrimes').textContent = totalCrimes.toLocaleString();
            document.getElementById('topState').textContent = data.states[0] || '-';
            document.getElementById('dataYear').textContent = data.year;

            // Update list
            const list = document.getElementById('dataList');
            list.innerHTML = '';
            data.states.forEach((state, i) => {
                const li = document.createElement('li');
                li.className = 'data-item';
                li.innerHTML = `
                    <span class="state-name">${i + 1}. ${state}</span>
                    <span class="crime-count">${data.crimes[i].toLocaleString()}</span>
                `;
                list.appendChild(li);
            });

            // Update chart
            if (chart) chart.destroy();
            const ctx = document.getElementById('crimeChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.states,
                    datasets: [{
                        label: `Crimes in ${data.year}`,
                        data: data.crimes,
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        y: { beginAtZero: true }
                    },
                    plugins: {
                        legend: { display: true }
                    }
                }
            });
        });

        function requestData() {
            socket.emit('request_live_data');
        }

        // Auto-refresh every 30 seconds
        setInterval(() => {
            socket.emit('request_live_data');
        }, 30000);
    </script>
</body>
</html>
